# Flex Fitness — Docker Compose
# Build: docker compose up -d --build
# Open: http://localhost (frontend); API at http://localhost:8000

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: flex-fitness-backend:latest
    container_name: flex-fitness-backend
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/coach.db
      - CHROMA_PERSIST_DIR=./data/chroma
    volumes:
      - backend_data:/app/backend/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: flex-fitness-frontend:latest
    container_name: flex-fitness-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  backend_data:
