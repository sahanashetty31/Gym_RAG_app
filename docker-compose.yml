services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: gym-rag-backend
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/coach.db
      - CHROMA_PERSIST_DIR=./data/chroma
    volumes:
      - backend_data:/app/backend/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: gym-rag-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  backend_data:
